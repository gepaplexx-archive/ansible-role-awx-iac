---
# defaults file for awx-inventory-example
awx_iac_host_ip: '127.0.0.1'
awx_iac_user: 'example'
awx_iac_pass: 'example'


## One example per resource type
  awx.awx.organisation:
    name: gepaplexx
    description: The gepaplexx organisation
    state: present

awx_iac_credentials:
    - name: Credential Example 1
      description: An example Credential
      organization: gepaplexx
      credential_type: Ansible Galaxy/Automation Hub API Token
      inputs: 
        galaxy_server_url: https://galaxy.ansible.com/

awx_iac_projects:
    - name: Project Examlple 1
      description: An Example Project
      organization: gepaplexx
      scm_type: git
      scm_branch: main
      scm_url: https://github.com/gepaplexx/createme.git
      update_project: yes

awx_iac_inventories:
    - name: Inventory Example 1
      description: An example Inventory
      organization: gepaplexx

awx_iac_inventorysources:
    - name: Inventory Source Example 1
      description: An example Inventory Source
      inventory: Inventory Example 1
      credential: Credentials Example 1
      overwite: true
      update_on_launch: true
      organization: gepaplexx
      source_vars:
          private: false

awx_iac_hosts:
    - name: Hosts Example 1
      description: An example Host
      inventory: "Inventory Example 1"
      variables:
          example_var: 123

awx_iac_job_templates:
    - name: Job Template Example 1
      description: An example Job Template
      job_type: run
      inventory: Inventory Example 1
      project: Project Example 1
      playbook: Playbooke Example
      credentials: Credentials Example 1

awx_iac_workflowjob_templates:
    - name: Workflow Job Template Example 1
      description: An example Workflow Job Template
      organisation: gepaplexx
      schema:
        - identifier: node1
          unified_job_template:
            name: Inventory Source
            inventory:
              organization:
                name: gepaplexx
            type: inventory_source
          related:
            success_nodes:
              - identifier: node2
            failure_nodes: []
            always_nodes: []
            credentials: []
        - identifier: node2
          unified_job_template:
            name: Job template
            organization: 
              name: gepaplexx
            type: job_template
          related:
            success_nodes: []
            failure_nodes: []
            always_nodes: []
            credentials: []
...