---
- name: Add AWX Organization
  awx.awx.organization:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_organizations }}"


- name: Add AWX Credentials
  awx.awx.credential:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    credential_type: "{{ item.credential_type }}"
    inputs: "{{ item.inputs | default({}) }}"
    # update_secrets deactivated for dev
    update_secrets: "{{ item.update_secrets | default(false) }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_credentials }}"

- name: Add AWX Projects
  awx.awx.project:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    credential: "{{ item.credential }}"
    scm_type: "{{ item.scm_type }}"
    scm_branch: "{{ item.scm_branch }}"
    scm_url: "{{ item.scm_url }}"
    scm_refspec: "{{ item.scm_refspec }}"
    scm_clean: "{{ item.scm_clean }}"
    scm_track_submodules: "{{ item.scm_track_submodules }}"
    scm_delete_on_update: "{{ item.scm_delete_on_update }}"
    scm_update_on_launch: "{{ item.scm_update_on_launch }}"
    scm_update_cache_timeout: "{{ item.scm_update_cache_timeout }}"
    allow_override: "{{ item.allow_override }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_projects }}"

- name: Add AWX Inventories
  awx.awx.inventory:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_inventories }}"

- name: Add AWX Inventory Sources
  awx.awx.inventory_source:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    inventory: "{{ item.inventory }}"
    credential: "{{ item.credential }}"
    overwrite: "{{ item.overwrite }}"
    update_on_launch: "{{ item.update_on_launch }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    source: "{{ item.source }}"
    source_project: "{{ item.source_project }}"
    source_path: "{{ item.source_path }}"
    source_vars: "{{ item.source_vars | default({}) }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_inventory_sources }}"

- name: Update Inventory Sources and import Hosts
  awx.awx.inventory_source_update:
    name: "{{ item.name }}"
    inventory: "{{ item.inventory }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_inventory_sources }}"
  # deactivated for development
  when: false

- name: Add AWX Execution Environment
  awx.awx.execution_environment:
    name: "{{ item.name }}"
    image: "{{ item.image }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_execution_environments }}"

# TODO: awx.awx.job_template.expects to match exactly 
# one inventory if the variable is present
- name: Add AWX Job Template
  awx.awx.job_template:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    execution_environment: "{{ item.execution_environment | default('') }}"
    job_type: "{{ item.job_type }}"
    inventory: "{{ item.inventory | default('') }}"
    project: "{{ item.project }}"
    playbook: "{{ item.playbook }}"
    credentials: "{{ item.credentials | default([]) }}"
    limit: "{{ item.limit | default('') }}"
    become_enabled: "{{ item.become_enabled | default(true) }}"
    ask_inventory_on_launch: "{{ item.ask_inventory_on_launch | default(true) }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_job_templates }}"

- name: Add AWX Workflow Job Template
  awx.awx.workflow_job_template:
    name: "{{ item.name }}"
    description: "{{ item.description }}"
    organization: "{{ item.organization | default('gepaplexx') }}"
    schema: "{{ item.schema }}"
    state: present
    validate_certs: true
    controller_host: "{{ awx_iac_host_ip }}"
    controller_username: "{{ awx_iac_user }}"
    controller_password: "{{ awx_iac_pass }}"
  loop: "{{ awx_iac_workflow_job_templates }}"
